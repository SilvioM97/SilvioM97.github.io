<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Academicons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.4/css/academicons.min.css">
  <!-- Minimal custom tweaks -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body class="flex flex-col min-h-screen bg-white text-slate-900 antialiased">
  <nav id="site-nav" class="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <ul class="flex gap-6 py-3 text-sm">
        <li><a href="#about"       class="nav-link text-slate-500 hover:text-slate-900 transition-colors">About</a></li>
        <li><a href="#open-source" class="nav-link text-slate-500 hover:text-slate-900 transition-colors">Projects</a></li>
        <li><a href="#publications" class="nav-link text-slate-500 hover:text-slate-900 transition-colors">Publications</a></li>
        <li><a href="#experience"  class="nav-link text-slate-500 hover:text-slate-900 transition-colors">Experience</a></li>
        <li><a href="#out-of-office" class="nav-link text-slate-500 hover:text-slate-900 transition-colors">Out of Office</a></li>
      </ul>
    </div>
  </nav>
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{ content }}
  </main>
  <footer class="border-t border-slate-200 py-6 mt-auto">
    <p class="text-center text-sm text-slate-500">&copy; {{ site.time | date: '%Y' }} Silvio</p>
  </footer>
  <script>
    const navLinks = document.querySelectorAll('.nav-link');
    const sections = document.querySelectorAll('section[id]');

    const setActive = (id) => {
      navLinks.forEach(link => {
        const active = link.getAttribute('href') === '#' + id;
        link.classList.toggle('text-slate-900', active);
        link.classList.toggle('font-medium', active);
        link.classList.toggle('text-slate-500', !active);
      });
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) setActive(entry.target.id); });
    }, { rootMargin: '-20% 0px -70% 0px' });

    sections.forEach(s => observer.observe(s));
  </script>
</body>

</html>
