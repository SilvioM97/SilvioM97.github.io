bio: >
  I'm a Computer Science PhD Researcher at the University of Pisa and ISTI-CNR, and a founding member of the <a class="underline hover:no-underline text-sky-700" href="https://tuskanny.com" target="_blank" rel="noopener">tusKANNy</a> research group.
  My work bridges theory and systems. I specialize in Information Retrieval and Approximate Nearest Neighbors (ANN), translating deep academic research into high-performance AI infrastructure.
  Specifically, I architect and maintain scalable, open-source Rust libraries for vector retrieval.

